<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Una colección de juegos e historias inspiradas en las culturas de los Andes."
        />
        <title>Moixllik - Juegos e Historias de los Andes</title>
        <style>
            html,
            body,
            canvas {
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                color: white;
                overflow: hidden;
                position: absolute;
                text-align: center;
            }
            html,
            body {
                background: #000;
            }
        </style>
    </head>
    <body>
        <noscript>
            <p>Se requiere un navegador con JavaScript.</p>
        </noscript>
        <p id="message"></p>
        <canvas id="glcanvas" tabindex="1"></canvas>
        <script src="https://cdn.moix.cc/quad/gl.js"></script>
        <script src="https://cdn.moix.cc/quad/audio.js"></script>
        <script src="https://cdn.moix.cc/quad/sapp_jsutils.js"></script>
        <script src="https://cdn.moix.cc/quad/quad-url.js"></script>
        <script>
            document.getElementById("message").innerText = "Cargando...";
            load("./pkg/app.wasm");
        </script>
    </body>
</html>
